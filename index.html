<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rolling Skew Analyzer</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh}
header{background:#161b22;border-bottom:1px solid #30363d;padding:16px 24px;display:flex;align-items:center;gap:12px}
header h1{font-size:1.2rem;font-weight:600;color:#f0f6fc}
header span{font-size:.8rem;color:#8b949e;background:#21262d;padding:2px 8px;border-radius:12px;border:1px solid #30363d}
.controls{background:#161b22;border-bottom:1px solid #30363d;padding:14px 24px;display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end}
.ctrl-group{display:flex;flex-direction:column;gap:4px}
.ctrl-group label{font-size:.75rem;color:#8b949e;font-weight:500;text-transform:uppercase;letter-spacing:.05em}
select,input[type=number]{background:#21262d;border:1px solid #30363d;color:#e6edf3;border-radius:6px;padding:6px 10px;font-size:.875rem;outline:none}
select:focus,input:focus{border-color:#388bfd}
select[multiple]{height:130px;min-width:220px}
.btn-row{display:flex;gap:8px;align-self:flex-end}
button{background:#238636;color:#fff;border:none;border-radius:6px;padding:8px 18px;font-size:.875rem;font-weight:600;cursor:pointer;height:34px}
button:hover{background:#2ea043}
button:disabled{background:#21262d;color:#484f58;cursor:not-allowed}
.btn-sec{background:#21262d;color:#e6edf3;border:1px solid #30363d}
.btn-sec:hover{background:#30363d}
.info-bar{padding:10px 24px;font-size:.78rem;color:#8b949e;background:#0d1117;min-height:32px}
.info-bar.error{color:#f85149}
.info-bar.ok{color:#3fb950}
.legend{display:flex;gap:18px;padding:10px 24px 0;font-size:.75rem;color:#8b949e}
.legend span{display:flex;align-items:center;gap:5px}
.legend span::before{content:'';display:inline-block;width:24px;height:3px;border-radius:2px}
.leg-np::before{background:#58a6ff}
.leg-mo::before{background:#ff7b54}
.charts{padding:20px 24px;display:flex;flex-direction:column;gap:32px}
.chart-card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:18px 20px}
.chart-title{font-size:.95rem;font-weight:600;margin-bottom:4px;color:#f0f6fc}
.chart-sub{font-size:.78rem;color:#8b949e;margin-bottom:14px}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.chart-wrap{position:relative;height:220px}
.badge{display:inline-block;font-size:.7rem;padding:1px 7px;border-radius:10px;margin-left:6px;vertical-align:middle}
.badge-np{background:#1f4e79;color:#79c0ff}
.badge-mo{background:#4e2a00;color:#ffa657}
.badge-ex{background:#1c2b3a;color:#8b949e}
.empty{text-align:center;padding:60px;color:#484f58;font-size:.9rem}
@media(max-width:700px){.chart-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#58a6ff" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
  <h1>Rolling Skew Analyzer</h1>
  <span id="hdrBadge">loading...</span>
</header>
<div class="controls">
  <div class="ctrl-group">
    <label>Stock List (CSV)</label>
    <select id="fileSelect" onchange="onFileChange()"></select>
  </div>
  <div class="ctrl-group">
    <label>Exchange Suffix</label>
    <select id="exchangeSel">
      <option value="">None (US)</option>
      <option value=".NS">NSE India (.NS)</option>
      <option value=".BO">BSE India (.BO)</option>
      <option value=".L">London (.L)</option>
      <option value=".AX">ASX Australia (.AX)</option>
      <option value=".HK">Hong Kong (.HK)</option>
      <option value=".T">Tokyo (.T)</option>
      <option value=".TO">Toronto (.TO)</option>
    </select>
  </div>
  <div class="ctrl-group">
    <label>Tickers</label>
    <select id="tickerSelect" multiple></select>
  </div>
  <div class="ctrl-group">
    <label>Window (days)</label>
    <input type="number" id="windowInput" value="20" min="3" max="252" style="width:90px"/>
  </div>
  <div class="ctrl-group">
    <label>Period</label>
    <select id="periodSelect">
      <option value="1y">1 Year</option>
      <option value="2y" selected>2 Years</option>
      <option value="5y">5 Years</option>
    </select>
  </div>
  <div class="btn-row">
    <button id="runBtn" onclick="runAnalysis()">Run</button>
    <button class="btn-sec" onclick="selectAll()">All</button>
    <button class="btn-sec" onclick="selectNone()">None</button>
    <button class="btn-sec" onclick="loadFiles()">Refresh</button>
  </div>
</div>
<div class="legend">
  <span class="leg-np">NP Skew bounded (-1,1)</span>
  <span class="leg-mo">Moment Skew unbounded</span>
</div>
<div class="info-bar" id="infoBar">Loading CSV files...</div>
<div class="charts" id="charts"><div class="empty">Select a stock list and click Run.</div></div>
<script>
var REPO_RAW='https://raw.githubusercontent.com/VJTriumph/rolling-skew-analyzer/main/';
var REPO_API='https://api.github.com/repos/VJTriumph/rolling-skew-analyzer/contents/data';
var YF_URL='https://query1.finance.yahoo.com/v8/finance/chart/';
var CORS='https://corsproxy.io/?';
var chartReg={},csvFiles=[],currentStocks=[];
function dc(id){if(chartReg[id]){chartReg[id].destroy();delete chartReg[id];}}
function mean(a){var s=0;for(var i=0;i<a.length;i++)s+=a[i];return s/a.length;}
function median(a){var s=a.slice().sort(function(x,y){return x-y;});var m=Math.floor(s.length/2);return s.length%2?s[m]:(s[m-1]+s[m])/2;}
function stdev(a){var mu=mean(a),s=0;for(var i=0;i<a.length;i++)s+=(a[i]-mu)*(a[i]-mu);return Math.sqrt(s/(a.length-1));}
function npSkew(a){var s=stdev(a);return s===0?null:(mean(a)-median(a))/s;}
function momentSkew(a){var mu=mean(a),s=stdev(a);if(s===0)return null;var sum=0;for(var i=0;i<a.length;i++)sum+=Math.pow((a[i]-mu)/s,3);return sum/a.length;}
function rolling(fn,data,w){return data.map(function(_,i){return i<w-1?null:fn(data.slice(i-w+1,i+1));});}
function logRets(p){return p.slice(1).map(function(v,i){return Math.log(v/p[i]);});}
function parseCSV(text){
  var lines=text.trim().split('\n').map(function(l){return l.trim();}).filter(Boolean);
  if(lines.length<2)return[];
  var headers=lines[0].split(',').map(function(h){return h.trim().toLowerCase();});
  return lines.slice(1).map(function(line){
    var vals=line.split(',').map(function(v){return v.trim();});
    var obj={};headers.forEach(function(h,i){obj[h]=vals[i]||'';});return obj;
  }).filter(function(r){return r.ticker;});
}
function yfTicker(raw){var sx=document.getElementById('exchangeSel').value;if(!sx)return raw;return raw.indexOf('.')!==-1?raw:raw+sx;}
async function loadFiles(){
  setInfo('Scanning data/ folder...','');
  try{
    var res=await fetch(CORS+encodeURIComponent(REPO_API));
    var files=await res.json();
    csvFiles=Array.isArray(files)?files.filter(function(f){return f.name.endsWith('.csv');}).map(function(f){return {name:f.name,path:f.path};}):[];
    var sel=document.getElementById('fileSelect');sel.innerHTML='';
    if(!csvFiles.length){sel.innerHTML='<option>No CSV files found</option>';setInfo('No CSV files found.','error');return;}
    csvFiles.forEach(function(f,i){var o=document.createElement('option');o.value=i;o.textContent=f.name;sel.appendChild(o);});
    document.getElementById('hdrBadge').textContent=csvFiles.length+' list'+(csvFiles.length>1?'s':'');
    await onFileChange();
  }catch(e){setInfo('Error scanning data/: '+e.message,'error');}
}
async function onFileChange(){
  var idx=parseInt(document.getElementById('fileSelect').value);
  if(isNaN(idx)||!csvFiles[idx])return;
  var f=csvFiles[idx];
  try{
    var res=await fetch(CORS+encodeURIComponent(REPO_RAW+f.path));
    var text=await res.text();
    currentStocks=parseCSV(text);
    var sel=document.getElementById('tickerSelect');sel.innerHTML='';
    currentStocks.forEach(function(s){var o=document.createElement('option');o.value=s.ticker;o.textContent=s.ticker+(s.name?' - '+s.name:'');sel.appendChild(o);});
    Array.from(sel.options).slice(0,5).forEach(function(o){o.selected=true;});
    setInfo('Loaded '+currentStocks.length+' tickers from '+f.name,'ok');
  }catch(e){setInfo('Could not load '+f.name+': '+e.message,'error');}
}
function selectAll(){Array.from(document.getElementById('tickerSelect').options).forEach(function(o){o.selected=true;});}
function selectNone(){Array.from(document.getElementById('tickerSelect').options).forEach(function(o){o.selected=false;});}
async function fetchYF(ticker,period){
  var url=YF_URL+encodeURIComponent(ticker)+'?interval=1d&range='+period;
  var res=await fetch(CORS+encodeURIComponent(url));
  if(!res.ok)throw new Error('HTTP '+res.status+' - "'+ticker+'" not found. Check exchange suffix.');
  var json=await res.json();
  var r=json&&json.chart&&json.chart.result&&json.chart.result[0];
  if(!r)throw new Error('No data for "'+ticker+'" - verify ticker and exchange suffix.');
  var ts=r.timestamp.map(function(t){return new Date(t*1000);});
  var cl=(r.indicators.adjclose&&r.indicators.adjclose[0]&&r.indicators.adjclose[0].adjclose)||r.indicators.quote[0].close;
  var pairs=ts.map(function(t,i){return {t:t,c:cl[i]};}).filter(function(p){return p.c!=null;});
  return {dates:pairs.map(function(p){return p.t;}),prices:pairs.map(function(p){return p.c;})};
}
function mkChart(cid,dates,vals,color,yFixed){
  dc(cid);
  var ctx=document.getElementById(cid).getContext('2d');
  chartReg[cid]=new Chart(ctx,{type:'line',
    data:{datasets:[{label:yFixed?'NP Skew':'Moment Skew',data:dates.map(function(d,i){return {x:d,y:vals[i]};}).filter(function(p){return p.y!=null;}),borderColor:color,borderWidth:1.5,pointRadius:0,tension:0.2,fill:false}]},
    options:{animation:false,responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.dataset.label+': '+(c.parsed.y!=null?c.parsed.y.toFixed(3):'');}}}},
      scales:{
        x:{type:'time',time:{unit:'month'},grid:{color:'#21262d'},ticks:{color:'#8b949e',maxTicksLimit:8}},
        y:{grid:{color:'#21262d'},ticks:{color:'#8b949e',maxTicksLimit:6},min:yFixed?-1.1:undefined,max:yFixed?1.1:undefined}
      }
    }
  });
}
async function runAnalysis(){
  var tickers=Array.from(document.getElementById('tickerSelect').selectedOptions).map(function(o){return o.value;});
  var win=parseInt(document.getElementById('windowInput').value)||20;
  var period=document.getElementById('periodSelect').value;
  var suffix=document.getElementById('exchangeSel').value;
  if(!tickers.length){setInfo('Select at least one ticker.','error');return;}
  var btn=document.getElementById('runBtn');btn.disabled=true;btn.textContent='Fetching...';
  document.getElementById('charts').innerHTML='';
  var done=0;
  for(var ti=0;ti<tickers.length;ti++){
    var raw=tickers[ti];var yft=yfTicker(raw);
    setInfo('['+(done+1)+'/'+tickers.length+'] Fetching '+yft+'...','');
    try{
      var data=await fetchYF(yft,period);
      var rets=logRets(data.prices);var rdates=data.dates.slice(1);
      var npR=rolling(npSkew,rets,win);var moR=rolling(momentSkew,rets,win);
      var lnp=npR.filter(function(x){return x!=null;}).pop();
      var lmo=moR.filter(function(x){return x!=null;}).pop();
      var stk=currentStocks.find(function(s){return s.ticker===raw;})||{};
      var card=document.createElement('div');card.className='chart-card';
      var ttl=document.createElement('div');ttl.className='chart-title';
      ttl.textContent=yft;
      if(stk.name){var sm=document.createElement('small');sm.style.cssText='font-weight:400;color:#8b949e';sm.textContent=' - '+stk.name;ttl.appendChild(sm);}
      if(stk.sector){var sp=document.createElement('span');sp.className='badge badge-ex';sp.textContent=stk.sector;ttl.appendChild(sp);}
      if(suffix){var sfsp=document.createElement('span');sfsp.className='badge badge-ex';sfsp.textContent=suffix;ttl.appendChild(sfsp);}
      card.appendChild(ttl);
      var sub=document.createElement('div');sub.className='chart-sub';
      sub.innerHTML='Window: <b>'+win+'d</b> &nbsp;|&nbsp; NP skew: <b style="color:#58a6ff">'+(lnp!=null?lnp.toFixed(3):'--')+'</b> <span class="badge badge-np">bounded</span> &nbsp;|&nbsp; Moment skew: <b style="color:#ff7b54">'+(lmo!=null?lmo.toFixed(3):'--')+'</b> <span class="badge badge-mo">unbounded</span>';
      card.appendChild(sub);
      var row=document.createElement('div');row.className='chart-row';
      var safeId=raw.replace(/[^a-zA-Z0-9]/g,'_');
      var c1=document.createElement('div');var l1=document.createElement('div');l1.style.cssText='font-size:.75rem;color:#58a6ff;margin-bottom:6px';l1.textContent='NP skew (mean-median)/sigma  |bounds +/-1|';
      var w1=document.createElement('div');w1.className='chart-wrap';var cv1=document.createElement('canvas');cv1.id='np_'+safeId;w1.appendChild(cv1);c1.appendChild(l1);c1.appendChild(w1);row.appendChild(c1);
      var c2=document.createElement('div');var l2=document.createElement('div');l2.style.cssText='font-size:.75rem;color:#ff7b54;margin-bottom:6px';l2.textContent='Moment skew  mean((r-mu)^3)/sigma^3  unbounded';
      var w2=document.createElement('div');w2.className='chart-wrap';var cv2=document.createElement('canvas');cv2.id='mo_'+safeId;w2.appendChild(cv2);c2.appendChild(l2);c2.appendChild(w2);row.appendChild(c2);
      card.appendChild(row);document.getElementById('charts').appendChild(card);
      mkChart('np_'+safeId,rdates,npR,'#58a6ff',true);mkChart('mo_'+safeId,rdates,moR,'#ff7b54',false);
      done++;
    }catch(e){
      var ec=document.createElement('div');ec.className='chart-card';
      var eh=document.createElement('div');eh.style.cssText='font-size:.95rem;font-weight:600;color:#f85149;margin-bottom:6px';eh.textContent=yft+' - Error';
      var em=document.createElement('div');em.style.cssText='font-size:.8rem;color:#8b949e';em.textContent=e.message;
      ec.appendChild(eh);ec.appendChild(em);document.getElementById('charts').appendChild(ec);done++;
    }
  }
  setInfo('Done - '+done+' ticker(s) | window='+win+'d'+(suffix?' | '+suffix:''),'ok');
  btn.disabled=false;btn.textContent='Run';
}
function setInfo(msg,type){var el=document.getElementById('infoBar');el.textContent=msg;el.className='info-bar'+(type?' '+type:'');}
loadFiles();
</script>
</body>
</html>
